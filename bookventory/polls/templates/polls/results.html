{% extends 'polls/base.html' %}
{% block title %}Results — Votecast{% endblock %}
{% block content %}
<div class="card">
    <h1 class="card-title">{{ question.question_text }}</h1>
    <ul class="results-list">
        {% for choice in question.choice_set.all %}
        <li>
            <div class="result-row">
                <div class="result-label">{{ choice.choice_text }}</div>
                <div class="result-count">{{ choice.votes }}</div>
            </div>
        </li>
        {% endfor %}
    </ul>
    <div class="form-actions">
        <a class="btn" href="{% url 'polls:detail' question.id %}">Vote Again?</a>
        <a class="btn outline" href="/polls/">Back to Polls</a>
    </div>
</div>
{% endblock %}
